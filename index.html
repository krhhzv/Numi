<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numi</title>

<style>
:root {
  --bg: radial-gradient(circle at 20% 20%, #f0f4ff, #dde6ff);
  --glass: rgba(255,255,255,0.25);
  --glass-strong: rgba(255,255,255,0.45);
  --text: #0f172a;
  --accent: #6c8cff;
}

body.dark {
  --bg: radial-gradient(circle at 20% 20%, #0f172a, #020617);
  --glass: rgba(255,255,255,0.05);
  --glass-strong: rgba(255,255,255,0.1);
  --text: #e5e7eb;
  --accent: #7aa2ff;
}

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  -webkit-font-smoothing: antialiased;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CONTAINER */
.numi {
  width:100%;
  max-width:420px;
  padding:20px;
}

/* GLASS CARD */
.card {
  position:relative;
  border-radius:36px;
  padding:32px;
  backdrop-filter: blur(40px);
  background: var(--glass);
  box-shadow: 0 40px 100px rgba(0,0,0,0.15);
}

/* DISPLAY */
.display-wrap {
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

#input {
  width:100%;
  border:none;
  outline:none;
  background:transparent;
  text-align:center;

  font-size:52px;
  font-weight:400;
  letter-spacing:0.8px;
  color:var(--text);

  font-variant-numeric: tabular-nums;
  transition: font-size 0.2s ease;
}

#result {
  text-align:center;
  font-size:17px;
  opacity:0.5;
  margin-top:10px;
  transition: all 0.25s ease;
}

/* GRID */
.grid {
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
}

button {
  height:68px;
  border:none;
  border-radius:22px;
  font-size:18px;
  background: var(--glass-strong);
  backdrop-filter: blur(20px);
  color:var(--text);

  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  transition: all 0.2s ease;
}

button:active {
  transform:scale(0.94);
  box-shadow: inset 0 4px 12px rgba(0,0,0,0.15);
}

.op { color:var(--accent); }
.eq { background: var(--accent); color:white; }
.zero { grid-column: span 2; }

/* DESKTOP */
@media (min-width:768px){
  #input { font-size:60px; }
  button { height:78px; font-size:20px; }
}
</style>
</head>

<body>

<div class="numi">
  <div class="card">

    <div class="display-wrap">
      <input id="input" placeholder="0">
    </div>

    <div id="result"></div>

    <div class="grid">
      <button onclick="clearAll()">C</button>
      <button onclick="back()">⌫</button>
      <button onclick="insert('/')">÷</button>
      <button onclick="insert('*')">×</button>

      <button onclick="insert('7')">7</button>
      <button onclick="insert('8')">8</button>
      <button onclick="insert('9')">9</button>
      <button onclick="insert('-')">−</button>

      <button onclick="insert('4')">4</button>
      <button onclick="insert('5')">5</button>
      <button onclick="insert('6')">6</button>
      <button onclick="insert('+')">+</button>

      <button onclick="insert('1')">1</button>
      <button onclick="insert('2')">2</button>
      <button onclick="insert('3')">3</button>
      <button class="eq" onclick="calc()">=</button>

      <button class="zero" onclick="insert('0')">0</button>
      <button onclick="insert('.')">.</button>
    </div>

  </div>
</div>

<script>
const input=document.getElementById("input");
const result=document.getElementById("result");

/* INSERT AT CURSOR */
function insert(v){
  let s=input.selectionStart;
  let e=input.selectionEnd;
  let t=input.value;

  input.value = t.slice(0,s)+v+t.slice(e);
  input.selectionStart = input.selectionEnd = s + v.length;

  live();
}

/* LIVE RESULT */
input.addEventListener("input", live);

function live(){
  adjustFont();

  let exp=parseNatural(input.value);

  try{
    let r=evalRPN(toRPN(tokenize(exp)));
    result.textContent="= "+format(r);
    result.style.opacity="0.6";
  }catch{
    result.textContent="";
  }
}

/* NATURAL LANGUAGE */
function parseNatural(s){
  return s
    .replace(/(\d+)% of (\d+)/gi,(_,a,b)=> (a/100)*b)
    .replace(/(\d+)%/g,(_,a)=> a/100);
}

/* FONT SCALING (CURSOR SAFE) */
function adjustFont(){
  const maxWidth=input.clientWidth;
  let cursor=input.selectionStart;

  const mirror=document.createElement("span");
  const style=getComputedStyle(input);

  mirror.style.position="absolute";
  mirror.style.visibility="hidden";
  mirror.style.whiteSpace="pre";
  mirror.style.fontFamily=style.fontFamily;
  mirror.style.letterSpacing=style.letterSpacing;

  document.body.appendChild(mirror);

  let size=parseFloat(style.fontSize);

  function width(){
    mirror.style.fontSize=size+"px";
    mirror.textContent=input.value || "0";
    return mirror.offsetWidth;
  }

  while(width()>maxWidth && size>24) size--;
  while(width()<maxWidth*0.8 && size<60) size++;

  input.style.fontSize=size+"px";
  input.setSelectionRange(cursor,cursor);

  document.body.removeChild(mirror);
}

/* CONTROL */
function clearAll(){ input.value=""; result.textContent=""; }
function back(){
  let s=input.selectionStart;
  if(s>0){
    input.value=input.value.slice(0,s-1)+input.value.slice(s);
    input.selectionStart=input.selectionEnd=s-1;
  }
  live();
}

function calc(){
  input.value=result.textContent.replace("= ","")||input.value;
  result.textContent="";
}

/* PARSER */
function tokenize(s){
  let t=[],n="";
  for(let c of s){
    if("0123456789.".includes(c)) n+=c;
    else if("+-*/".includes(c)){
      if(n){t.push(parseFloat(n));n="";}
      if(c==="-"&&(t.length===0||typeof t[t.length-1]==="string")) n="-";
      else t.push(c);
    }
  }
  if(n) t.push(parseFloat(n));
  return t;
}

function toRPN(t){
  let o=[],s=[],p={"+":1,"-":1,"*":2,"/":2};
  t.forEach(x=>{
    if(typeof x==="number") o.push(x);
    else{
      while(s.length&&p[s[s.length-1]]>=p[x]) o.push(s.pop());
      s.push(x);
    }
  });
  return o.concat(s.reverse());
}

function evalRPN(r){
  let s=[];
  r.forEach(x=>{
    if(typeof x==="number") s.push(x);
    else{
      let b=s.pop(),a=s.pop();
      if(x==="+") s.push(a+b);
      if(x==="-") s.push(a-b);
      if(x==="*") s.push(a*b);
      if(x==="/"){ if(b===0) throw ""; s.push(a/b); }
    }
  });
  return s[0];
}

function format(n){
  return Number.isInteger(n)?n:parseFloat(n.toFixed(10));
}

/* AUTO DARK */
if(window.matchMedia('(prefers-color-scheme: dark)').matches){
  document.body.classList.add("dark");
}
</script>

</body>
</html>
